services:
  flow-normalizer:
    build: .
    env_file:
      - .env
    environment:
      - SFLOW_PORT=6343
      - NETFLOW_LISTEN_PORT=2055
    ports:
      - "${SFLOW_PORT:-6343}:6343/udp"
      - "${SFLOW_PORT:-6343}:6343/tcp"
      - "${NETFLOW_LISTEN_PORT:-2055}:2055/udp"
      - "${NETFLOW_LISTEN_PORT:-2055}:2055/tcp"
    # Required when SPOOF_UDP_SOURCE=true — allows binding to non-local source IPs.
    # cap_add:
    #   - NET_ADMIN
    restart: unless-stopped
